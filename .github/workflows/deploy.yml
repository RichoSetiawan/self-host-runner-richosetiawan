name: 🚀 Deploy ke Laptop (Self-Hosted Container Runner)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: docker-local        # label yang kita set di container runner

    steps:
      - name: ⬇️ Checkout kode
        uses: actions/checkout@v4

      - name: 🔨 Build & Deploy Containers
        run: |
          docker compose up -d --build --remove-orphans
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          LOAN_DATA_SOURCE_MODE: ${{ secrets.LOAN_DATA_SOURCE_MODE }}
          IDEMPOTENCY_ENABLED: ${{ secrets.IDEMPOTENCY_ENABLED }}