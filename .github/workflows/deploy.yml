name: Automated Self-Hosted Deployment

on:
  push:
    branches:
      - main  # Ganti ke 'master' jika Anda menggunakan nama branch tersebut

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
          echo "LOAN_DATA_SOURCE_MODE=${{ secrets.LOAN_DATA_SOURCE_MODE }}" >> .env
          echo "IDEMPOTENCY_ENABLED=${{ secrets.IDEMPOTENCY_ENABLED }}" >> .env

      - name: Build and Run Containers
        run: |
          # Menghentikan container lama jika ada dan menghapus cache yang tidak terpakai
          docker compose down
          
          # Membangun ulang image baru dan menjalankannya di background
          docker compose up -d --build
          
          # Membersihkan image lama (dangling images) agar penyimpanan server tidak penuh
          docker image prune -f