version: '3.8'

services:
  runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    environment:
      - REPO_URL=https://github.com/RichoSetiawan/self-host-runner-richosetiawan  # ganti dengan punyamu
      - RUNNER_NAME=laptop-runner
      - RUNNER_TOKEN=AWBX2J6TDUAYBOXFULACV2DKKO7DO                    # token yang baru disalin
      - LABELS=docker-local
      - RUNNER_REUSE=true                                 # PENTING: agar runner tidak didaftarkan ulang setiap start
      - EPHEMERAL=false                                   # pastikan tidak ephemeral
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner-data:/runner/data
    restart: unless-stopped